<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WhatsApp Chat UI</title>

<!-- Link the CSS file -->
<link rel="stylesheet" href="./channels.css">

</head>
<body>

<div class="chat-container">

    <div class="chat-header">
        John Doe
    </div>

    <div class="chat-messages">
        <div class="message received">Hey! How are you?</div>
        <div class="message sent">I'm good 😄 What about you?</div>
        <div class="message received">Doing great! Working on a project.</div>
        <div class="message sent">Nice! Good luck with it.</div>
    </div>

    <div class="chat-input">
        <input type="text" placeholder="Type a message">
        <button>Send</button>
    </div>

</div>

</body>
</html>
